<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Готовим из того, что есть</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Верхняя панель -->
        <header>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>🧑‍🍳 Рецепты из дома</h1>
            <div class="theme-switch">
                <button data-theme="green" class="theme-btn active">🍃 Зеленый</button>
                <button data-theme="orange" class="theme-btn">🍊 Оранжевый</button>
            </div>
        </header>

        <!-- Гамбургер-меню (мобильная навигация) -->
        <nav class="mobile-nav" id="mobileNav">
            <ul>
                <li><button class="nav-category" data-category="all">🏠 Все рецепты</button></li>
                <li><button class="nav-category" data-category="russian">🍞 Русская</button></li>
                <li><button class="nav-category" data-category="eastern">🥘 Восточная</button></li>
                <li><button class="nav-category" data-category="european">🍷 Европейская</button></li>
                <li><button id="openAiAssistantBtn" class="ai-assist-btn">🤖 ИИ-ассистент</button></li>
            </ul>
        </nav>

        <main>
            <!-- Блок фильтров -->
            <div class="filters-panel">
                <div class="ingredient-selector">
                    <h3>📦 Выбери продукты дома</h3>
                    <div class="ingredients-grid" id="ingredientsGrid">
                        <!-- динамически из JS -->
                    </div>
                </div>

                <div class="dish-type">
                    <h3>🍽️ Тип блюда</h3>
                    <div class="type-buttons">
                        <button data-type="salad">🥗 Салат</button>
                        <button data-type="snack">🍢 Закуска</button>
                        <button data-type="soup">🥣 Суп</button>
                        <button data-type="main">🍛 Второе</button>
                        <button data-type="dessert">🍰 Десерт</button>
                    </div>
                </div>

                <button id="findRecipesBtn" class="find-btn">✨ Найти, что приготовить</button>
            </div>

            <!-- Результаты: список блюд -->
            <div class="results-area">
                <h2>🍲 Что можно приготовить</h2>
                <div id="recipesList" class="recipes-list">
                    <div class="placeholder">Выбери ингредиенты и нажми "Найти"</div>
                </div>
            </div>
        </main>

        <!-- Модальное окно рецепта -->
        <div id="recipeModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="modalRecipeBody"></div>
            </div>
        </div>

        <!-- Модальное окно ИИ-ассистента -->
        <div id="aiModal" class="modal">
            <div class="modal-content ai-modal">
                <span class="close-ai">&times;</span>
                <h2>🤖 ИИ-шеф-помощник</h2>
                <p>Спроси меня о тонкостях приготовления, замене продуктов или технике:</p>
                <textarea id="aiQuestion" rows="3" placeholder="Например: как сделать, чтобы мясо было сочным?"></textarea>
                <button id="askAiBtn">Спросить ИИ</button>
                <div id="aiAnswer" class="ai-answer"></div>
                <div class="ai-note">💡 Подсказка: я — встроенный ассистент, знаю кулинарные лайфхаки!</div>
            </div>
        </div>
    </div>

    <script src="recipes.js"></script>
    <script src="script.js"></script>
</body>
</html>
