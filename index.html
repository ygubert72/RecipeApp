<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Шеф-повар</title>
    
    <!-- Фавикон -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232ecc71' rx='20'/><text x='50%' y='50%' text-anchor='middle' dy='.35em' font-size='70' fill='white'>👨‍🍳</text></svg>">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>👨‍🍳 Шеф-повар</h1>
            <div class="theme-switch">
                <button data-theme="green" class="theme-btn active">🍃 Зеленый</button>
                <button data-theme="orange" class="theme-btn">🍊 Оранжевый</button>
            </div>
        </header>

        <nav class="mobile-nav" id="mobileNav">
            <ul>
                <li><button class="nav-category" data-category="all">🏠 Все рецепты</button></li>
                <li><button class="nav-category" data-category="russian">🍞 Русская</button></li>
                <li><button class="nav-category" data-category="eastern">🥘 Восточная</button></li>
                <li><button class="nav-category" data-category="european">🍷 Европейская</button></li>
                <li><hr></li>
                <li><button class="nav-module" data-module="pp">🥗 ПП-рецепты</button></li>
                <li><button class="nav-module" data-module="cocktails">🍸 Коктейли</button></li>
                <li><button class="nav-module" data-module="smoothies">🥤 Смузи</button></li>
                <li><button id="openAiAssistantBtn" class="ai-assist-btn">🤖 ИИ-шеф</button></li>
            </ul>
        </nav>

        <main>
            <div class="filters-panel">
                <div class="ingredient-selector">
                    <h3>🧊 Продукты в холодильнике</h3>
                    <div id="ingredientsGroupsContainer"></div>
                </div>

                <div class="dish-type">
                    <h3>🍽️ Тип блюда</h3>
                    <div class="type-buttons">
                        <button data-type="all" class="active">🏠 Все</button>
                        <button data-type="salad">🥗 Салат</button>
                        <button data-type="snack">🍢 Закуска</button>
                        <button data-type="soup">🥣 Суп</button>
                        <button data-type="main">🍛 Второе</button>
                        <button data-type="sauce">🧴 Соус</button>
                        <button data-type="dessert">🍰 Десерт</button>
                        <button data-type="drink">🥤 Напиток</button>
                    </div>
                </div>

                <button id="findRecipesBtn" class="find-btn">✨ Найти рецепты</button>
            </div>

            <div class="results-area">
                <h2>Рецепты</h2>
                <div id="recipesList" class="recipes-list">
                    <div class="placeholder">✅ Выбери продукты и нажми "Найти"</div>
                </div>
            </div>
        </main>

        <div id="recipeModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="modalRecipeBody"></div>
            </div>
        </div>

        <div id="aiModal" class="modal">
            <div class="modal-content ai-modal">
                <span class="close-ai">&times;</span>
                <h2>🤖 ИИ-шеф-помощник</h2>
                <p>Спроси о замене продуктов, тонкостях или технике:</p>
                <textarea id="aiQuestion" rows="3" placeholder="Например: чем заменить сливки в соусе?"></textarea>
                <button id="askAiBtn">Спросить</button>
                <div id="aiAnswer" class="ai-answer"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ПОЛНАЯ БАЗА ПРОДУКТОВ С ГРУППИРОВКОЙ
        // ============================================
        
        const ingredientsGroups = [
            {
                name: "🥩 Мясо и птица",
                items: ["Говядина", "Свинина", "Баранина", "Кролик", "Курица", "Индейка", "Утка", "Фарш свиной", "Фарш говяжий", "Фарш куриный", "Печень говяжья", "Печень куриная"]
            },
            {
                name: "🐟 Рыба и морепродукты",
                items: ["Лосось", "Семга", "Тунец", "Скумбрия", "Сельдь", "Треска", "Минтай", "Креветки", "Кальмары", "Мидии", "Рыбные консервы", "Шпроты", "Печень трески"]
            },
            {
                name: "🥬 Овощи",
                items: ["Картофель", "Морковь", "Лук репчатый", "Лук красный", "Лук зеленый", "Чеснок", "Капуста белокочанная", "Капуста краснокочанная", "Брокколи", "Цветная капуста", "Брюссельская капуста", "Помидоры", "Огурцы", "Болгарский перец", "Перец красный жгучий", "Кабачки", "Баклажаны", "Тыква", "Свекла", "Редис", "Шпинат", "Салат", "Руккола", "Сельдерей", "Спаржа"]
            },
            {
                name: "🍎 Фрукты и ягоды",
                items: ["Яблоки", "Груши", "Бананы", "Апельсины", "Лимоны", "Мандарины", "Киви", "Виноград", "Клубника", "Малина", "Черника", "Вишня", "Персики", "Абрикосы", "Авокадо", "Гранат", "Ананас", "Манго", "Чернослив", "Курага", "Изюм", "Сухофрукты"]
            },
            {
                name: "🍄 Грибы",
                items: ["Белые грибы", "Лисички", "Грузди", "Рыжики", "Маслята", "Лесные грибы", "Шампиньоны", "Вешенки", "Шиитаке"]
            },
            {
                name: "🌿 Зелень и специи",
                items: ["Укроп", "Петрушка", "Кинза", "Базилик", "Мята", "Розмарин", "Тимьян", "Орегано", "Зеленый лук", "Черемша", "Руккола", "Шпинат", "Микрозелень", "Перец черный", "Перец красный жгучий", "Перец белый", "Смесь перцев", "Кориандр", "Паприка", "Куркума", "Имбирь"]
            },
            {
                name: "🍚 Крупы и бобовые",
                items: ["Гречка", "Рис", "Овсянка", "Пшено", "Перловка", "Булгур", "Кускус", "Киноа", "Маш", "Чечевица красная", "Чечевица зеленая", "Нут", "Фасоль", "Горох", "Бобы"]
            },
            {
                name: "🍝 Макаронные изделия",
                items: ["Спагетти", "Феттучини", "Лапша яичная", "Лапша рисовая", "Вермишель", "Рожки", "Перья", "Ракушки"]
            },
            {
                name: "🥛 Молочные продукты",
                items: ["Молоко", "Сливки", "Сметана", "Кефир", "Ряженка", "Йогурт", "Йогурт греческий", "Мацони", "Творог", "Сыр твердый", "Сыр плавленый", "Сыр моцарелла", "Сыр фета", "Сыр колбасный", "Сулугуни", "Брынза", "Сыр российский", "Сыр творожный", "Пармезан", "Масло сливочное", "Масло топленое", "Маргарин"]
            },
            {
                name: "🥚 Яйца",
                items: ["Яйца куриные", "Яйца перепелиные"]
            },
            {
                name: "🍞 Хлеб и выпечка",
                items: ["Хлеб белый", "Хлеб ржаной", "Батон", "Лаваш", "Багет", "Мука", "Дрожжи", "Разрыхлитель", "Ванилин", "Печенье затяжное", "Печенье сахарное", "Сухари панировочные", "Гренки", "Крекеры"]
            },
            {
                name: "🥫 Консервы и заготовки",
                items: ["Оливки", "Маслины", "Кукуруза консервированная", "Горошек консервированный", "Фасоль консервированная", "Томатная паста", "Огурцы маринованные", "Помидоры маринованные", "Грибы соленые", "Грибы маринованные", "Лечо", "Аджика"]
            },
            {
                name: "🧴 Масла и соусы",
                items: ["Масло подсолнечное", "Масло оливковое", "Масло кунжутное", "Соевый соус", "Томатный соус", "Майонез", "Кетчуп", "Горчица", "Хрен", "Уксус", "Бальзамический уксус"]
            },
            {
                name: "🥜 Орехи",
                items: ["Грецкий орех", "Пекан", "Фундук", "Миндаль", "Бразильский орех", "Кешью", "Макадамия", "Фисташки", "Арахис"]
            },
            {
                name: "🍰 Сладости",
                items: ["Сахар", "Какао", "Шоколад", "Мед", "Варенье", "Джем", "Конфитюр", "Кокосовая стружка"]
            }
        ];

        let selectedIngredients = new Set();
        let selectedType = "all";
        let currentCuisine = "all";

        // ============================================
        // ОТРИСОВКА ВСЕХ ГРУПП ПРОДУКТОВ (СВЕРНУТЫЕ)
        // ============================================
        
        function renderIngredients() {
            const container = document.getElementById('ingredientsGroupsContainer');
            if (!container) return;
            
            container.innerHTML = '';
            
            ingredientsGroups.forEach(group => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'ingredient-group';
                
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `<span class="group-title">${group.name}</span><span class="group-toggle">▶</span>`;
                
                const itemsDiv = document.createElement('div');
                itemsDiv.className = 'group-items';
                itemsDiv.style.display = 'none';
                
                group.items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.textContent = item;
                    btn.className = 'ingredient-btn';
                    btn.addEventListener('click', () => {
                        btn.classList.toggle('selected');
                        if (btn.classList.contains('selected')) {
                            selectedIngredients.add(item);
                        } else {
                            selectedIngredients.delete(item);
                        }
                    });
                    itemsDiv.appendChild(btn);
                });
                
                let collapsed = true;
                header.addEventListener('click', () => {
                    collapsed = !collapsed;
                    itemsDiv.style.display = collapsed ? 'none' : 'flex';
                    header.querySelector('.group-toggle').textContent = collapsed ? '▶' : '▼';
                });
                
                groupDiv.appendChild(header);
                groupDiv.appendChild(itemsDiv);
                container.appendChild(groupDiv);
            });
        }

        // ============================================
        // ПОИСК РЕЦЕПТОВ (ВРЕМЕННО)
        // ============================================
        
        function findRecipes() {
            const resultsDiv = document.getElementById('recipesList');
            
            if (selectedIngredients.size === 0) {
                resultsDiv.innerHTML = '<div class="placeholder">⚠️ Выберите продукты, которые есть дома</div>';
                return;
            }
            
            const ingredientsList = Array.from(selectedIngredients);
            
            resultsDiv.innerHTML = `
                <div class="placeholder">
                    🎉 <strong>Выбрано продуктов: ${ingredientsList.length}</strong><br><br>
                    📋 Список: ${ingredientsList.slice(0, 10).join(', ')}${ingredientsList.length > 10 ? '...' : ''}<br><br>
                    ⏳ <strong>Рецепты появятся здесь!</strong><br>
                    Скоро добавлю полную базу рецептов.
                </div>
            `;
        }

        // ============================================
        // НАСТРОЙКА ИНТЕРФЕЙСА
        // ============================================
        
        function setupEventListeners() {
            document.getElementById('menuToggle')?.addEventListener('click', () => {
                document.getElementById('mobileNav')?.classList.toggle('open');
            });
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.getAttribute('data-theme');
                    document.body.classList.remove('theme-green', 'theme-orange');
                    document.body.classList.add(`theme-${theme}`);
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            document.querySelectorAll('.type-buttons button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.type-buttons button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedType = btn.getAttribute('data-type');
                });
            });
            
            document.getElementById('findRecipesBtn')?.addEventListener('click', findRecipes);
            
            document.querySelectorAll('.nav-category').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCuisine = btn.getAttribute('data-category');
                    document.getElementById('mobileNav')?.classList.remove('open');
                    if (selectedIngredients.size > 0) findRecipes();
                });
            });
            
            // ИИ-ассистент
            const aiModal = document.getElementById('aiModal');
            const openAiBtn = document.getElementById('openAiAssistantBtn');
            const closeAi = document.querySelector('.close-ai');
            const askBtn = document.getElementById('askAiBtn');
            const aiQuestion = document.getElementById('aiQuestion');
            const aiAnswer = document.getElementById('aiAnswer');
            
            openAiBtn?.addEventListener('click', () => { if(aiModal) aiModal.style.display = 'flex'; });
            closeAi?.addEventListener('click', () => { if(aiModal) aiModal.style.display = 'none'; });
            
            askBtn?.addEventListener('click', () => {
                const q = aiQuestion?.value.trim();
                if (!q) {
                    if(aiAnswer) aiAnswer.innerHTML = '❓ Напишите ваш вопрос о готовке!';
                    return;
                }
                aiAnswer.innerHTML = '🧑‍🍳 ' + getAIAnswer(q);
            });
            
            const modal = document.getElementById('recipeModal');
            document.querySelector('.close')?.addEventListener('click', () => { if(modal) modal.style.display = 'none'; });
            window.onclick = (e) => { 
                if (e.target === modal) modal.style.display = 'none'; 
                if (e.target === aiModal) aiModal.style.display = 'none'; 
            };
        }
        
        function getAIAnswer(question) {
            const q = question.toLowerCase();
            if (q.includes('заменить яйца')) return 'Яйца можно заменить: банановым пюре (1 яйцо = 1/2 банана), льняной мукой с водой, или тофу.';
            if (q.includes('заменить сливки')) return 'Сливки заменяют: кокосовое молоко, смесь молока с маслом, или густая сметана с молоком.';
            if (q.includes('сочное мясо')) return 'Маринуй в кефире/йогурте 2 часа, не пережаривай, дай отдохнуть 5-10 минут после готовки.';
            if (q.includes('хрустящая корочка')) return 'Обсуши продукты перед жаркой, используй панировку, жарь на хорошо разогретой сковороде.';
            return `Отличный вопрос! Совет: всегда пробуй блюдо в процессе готовки.`;
        }
        
        // ============================================
        // ЗАПУСК
        // ============================================
        
        renderIngredients();
        setupEventListeners();
        document.body.classList.add('theme-green');
        
        console.log("✅ Приложение загружено!");
    </script>
</body>
</html>
