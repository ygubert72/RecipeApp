<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шеф-повар</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>👨‍🍳 Шеф-повар</h1>
            <div class="theme-switch">
                <button data-theme="green" class="theme-btn active">Зеленый</button>
                <button data-theme="orange" class="theme-btn">Оранжевый</button>
            </div>
        </header>

        <nav class="mobile-nav" id="mobileNav">
            <ul>
                <li><button class="nav-category" data-category="all">Все рецепты</button></li>
                <li><button class="nav-category" data-category="russian">Русская</button></li>
                <li><button class="nav-category" data-category="eastern">Восточная</button></li>
                <li><button class="nav-category" data-category="european">Европейская</button></li>
                <li><button id="openAiAssistantBtn">🤖 ИИ-шеф</button></li>
            </ul>
        </nav>

        <main>
            <div class="filters-panel">
                <h3>📦 Что есть дома?</h3>
                <div id="ingredientsGroupsContainer"></div>

                <h3>🍽️ Тип блюда</h3>
                <div class="type-buttons">
                    <button data-type="all" class="active">Все</button>
                    <button data-type="salad">Салат</button>
                    <button data-type="soup">Суп</button>
                    <button data-type="main">Второе</button>
                    <button data-type="dessert">Десерт</button>
                </div>

                <button id="findRecipesBtn" class="find-btn">✨ Найти рецепты</button>
            </div>

            <div class="results-area">
                <h2>Рецепты</h2>
                <div id="recipesList" class="recipes-list">
                    <div class="placeholder">Выбери продукты и нажми "Найти"</div>
                </div>
            </div>
        </main>

        <div id="aiModal" class="modal">
            <div class="modal-content">
                <span class="close-ai">&times;</span>
                <h2>🤖 ИИ-шеф</h2>
                <textarea id="aiQuestion" rows="3" placeholder="Спроси о готовке..."></textarea>
                <button id="askAiBtn">Спросить</button>
                <div id="aiAnswer"></div>
            </div>
        </div>
    </div>

    <script>
        // Продукты
        const groups = [
            { name: "🥩 Мясо", items: ["Курица", "Говядина", "Свинина"] },
            { name: "🥬 Овощи", items: ["Помидоры", "Огурцы", "Картофель"] },
            { name: "🥛 Молочка", items: ["Молоко", "Сыр", "Масло"] }
        ];

        let selected = new Set();

        // Отрисовка
        const container = document.getElementById('ingredientsGroupsContainer');
        groups.forEach(g => {
            const div = document.createElement('div');
            div.className = 'ingredient-group';
            div.innerHTML = `<div class="group-header"><span>${g.name}</span><span class="group-toggle">▶</span></div><div class="group-items" style="display:none"></div>`;
            const itemsDiv = div.querySelector('.group-items');
            g.items.forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item;
                btn.className = 'ingredient-btn';
                btn.onclick = () => {
                    btn.classList.toggle('selected');
                    if (btn.classList.contains('selected')) selected.add(item);
                    else selected.delete(item);
                };
                itemsDiv.appendChild(btn);
            });
            const header = div.querySelector('.group-header');
            let collapsed = true;
            header.onclick = () => {
                collapsed = !collapsed;
                itemsDiv.style.display = collapsed ? 'none' : 'flex';
                header.querySelector('.group-toggle').textContent = collapsed ? '▶' : '▼';
            };
            container.appendChild(div);
        });

        // Поиск
        document.getElementById('findRecipesBtn').onclick = () => {
            const results = document.getElementById('recipesList');
            if (selected.size === 0) results.innerHTML = '<div class="placeholder">Выберите продукты</div>';
            else results.innerHTML = `<div class="placeholder">Выбрано: ${selected.size} продуктов<br>Рецепты появятся позже</div>`;
        };

        // Тема
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.onclick = () => {
                const theme = btn.getAttribute('data-theme');
                document.body.classList.remove('theme-green', 'theme-orange');
                document.body.classList.add(`theme-${theme}`);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        // Меню
        document.getElementById('menuToggle').onclick = () => {
            document.getElementById('mobileNav').classList.toggle('open');
        };

        // ИИ
        const aiModal = document.getElementById('aiModal');
        document.getElementById('openAiAssistantBtn').onclick = () => aiModal.style.display = 'flex';
        document.querySelector('.close-ai').onclick = () => aiModal.style.display = 'none';
        document.getElementById('askAiBtn').onclick = () => {
            const q = document.getElementById('aiQuestion').value;
            document.getElementById('aiAnswer').innerHTML = q ? '🧑‍🍳 Совет: всегда пробуй блюдо!' : 'Напиши вопрос';
        };
        window.onclick = (e) => { if (e.target === aiModal) aiModal.style.display = 'none'; };
    </script>
</body>
</html>
