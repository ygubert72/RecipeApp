<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Шеф-повар — рецепты из продуктов дома</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232ecc71' rx='20'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.35em' font-size='70' fill='white'%3E👨‍🍳%3C/text%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>👨‍🍳 Шеф-повар</h1>
            <div class="theme-switch">
                <button data-theme="green" class="theme-btn active">Зеленый</button>
                <button data-theme="orange" class="theme-btn">Оранжевый</button>
            </div>
        </header>

        <nav class="mobile-nav" id="mobileNav">
            <ul>
                <li><button class="nav-category" data-category="all">Все рецепты</button></li>
                <li><button class="nav-category" data-category="russian">Русская</button></li>
                <li><button class="nav-category" data-category="eastern">Восточная</button></li>
                <li><button class="nav-category" data-category="european">Европейская</button></li>
                <li><hr></li>
                <li><button id="openAiAssistantBtn" class="ai-assist-btn">🤖 ИИ-шеф</button></li>
            </ul>
        </nav>

        <main>
            <div class="filters-panel">
                <div class="ingredient-selector">
                    <div class="ingredient-header">
                        <h3>🧊 Продукты в холодильнике</h3>
                        <div class="global-actions">
                            <button id="selectAllIngredientsBtn" class="global-select-all">✅ Выбрать всё</button>
                            <button id="deselectAllIngredientsBtn" class="global-deselect-all">❌ Убрать всё</button>
                        </div>
                    </div>
                    <div id="ingredientsGroupsContainer"></div>
                </div>

                <div class="dish-type">
                    <h3>🍽️ Тип блюда</h3>
                    <div class="type-buttons">
                        <button data-type="all" class="active">Все</button>
                        <button data-type="salad">Салат</button>
                        <button data-type="snack">Закуска</button>
                        <button data-type="soup">Суп</button>
                        <button data-type="main">Второе</button>
                        <button data-type="sauce">Соус</button>
                        <button data-type="dessert">Десерт</button>
                        <button data-type="drink">Напиток</button>
                    </div>
                </div>

                <button id="findRecipesBtn" class="find-btn">✨ Найти рецепты</button>
            </div>

            <div class="results-area">
                <h2>🍳 Рецепты</h2>
                <div id="recipesList" class="recipes-list">
                    <div class="placeholder">✨ Выбери продукты и нажми "Найти рецепты"</div>
                </div>
            </div>
        </main>

        <div id="recipeModal" class="modal"><div class="modal-content"><span class="close">&times;</span><div id="modalRecipeBody"></div></div></div>
        <div id="aiModal" class="modal"><div class="modal-content ai-modal"><span class="close-ai">&times;</span><h2>🤖 ИИ-шеф-помощник</h2><p>Спроси о замене продуктов:</p><textarea id="aiQuestion" rows="3" placeholder="Например: чем заменить сливки?"></textarea><button id="askAiBtn">Спросить</button><div id="aiAnswer" class="ai-answer"></div></div></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
