<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Шеф-повар</title>
    
    <!-- Фавикон -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232ecc71' rx='20'/><text x='50%' y='50%' text-anchor='middle' dy='.35em' font-size='70' fill='white'>👨‍🍳</text></svg>">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..600&display=swap" rel="stylesheet">
    
    <style>
        /* Дополнительные стили для новой логики поиска */
        .results-section {
            margin-bottom: 40px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
            flex-wrap: wrap;
        }
        
        .section-header.perfect {
            border-bottom-color: #2ecc71;
        }
        
        .section-header.missing1 {
            border-bottom-color: #f39c12;
        }
        
        .section-header.missing2 {
            border-bottom-color: #3498db;
        }
        
        .section-icon {
            font-size: 28px;
        }
        
        .section-header h3 {
            margin: 0;
            font-size: 1.3rem;
        }
        
        .section-desc {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .recipe-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border);
            box-shadow: 0 4px 12px var(--shadow);
            position: relative;
        }
        
        .recipe-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px var(--shadow);
        }
        
        .recipe-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .perfect-badge {
            background: #2ecc71;
            color: white;
        }
        
        .missing1-badge {
            background: #f39c12;
            color: white;
        }
        
        .missing2-badge {
            background: #3498db;
            color: white;
        }
        
        .missing-warning {
            background: #fef3c7;
            color: #d97706;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 12px;
            border-left: 3px solid #f39c12;
        }
        
        body.theme-orange .missing-warning {
            background: #fff3e0;
            color: #e67e22;
        }
        
        .recipe-meta {
            font-size: 12px;
            opacity: 0.7;
            margin: 8px 0;
            display: flex;
            gap: 12px;
        }
        
        .recipe-img-placeholder {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-bg));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .recipe-card h4 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--primary);
            padding-right: 40px;
        }
        
        .recipe-card p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .recipe-card small {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        @media (max-width: 768px) {
            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .section-desc {
                margin-left: 0;
            }
            .recipes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

                <div class="dish-type">

                    <div class="type-buttons">

            <div class="results-area">

        <div id="recipeModal" class="modal">

                <span class="close-ai">&times;</span>
                <h2>🤖 ИИ-шеф-помощник</h2>
                <p>Спроси о замене продуктов, тонкостях или технике:</p>
                <textarea id="aiQuestion" rows="3" placeholder="Например: чем заменить сливки в соусе?"></textarea>
                <button id="askAiBtn">Спросить</button>
                <div id="aiAnswer" class="ai-answer"></div>
            </div>
        </div>
    </div>

    <script type="module">

            },
            {

                items: ["Укроп", "Петрушка", "Кинза", "Базилик", "Мята", "Розмарин", "Тимьян", "Орегано", "Зеленый лук", "Черемша", "Руккола", "Шпинат", "Салат", "Микрозелень", "Соль поваренная", "Перец черный", "Перец красный жгучий", "Перец белый", "Смесь перцев", "Кориандр", "Паприка", "Куркума", "Имбирь"]
            },

                items: ["Гречка", "Рис", "Овсянка", "Пшено", "Перловка", "Булгур", "Кускус", "Киноа", "Маш", "Чечевица красная", "Чечевица зеленая", "Нут", "Фасоль", "Горох", "Бобы"]
            },
            {

                items: ["Спагетти", "Феттучини", "Лапша яичная", "Лапша рисовая", "Вермишель", "Рожки", "Перья", "Ракушки"]
            },
            {
                name: "🥛 Молочные продукты",
                items: ["Молоко", "Сливки", "Сметана", "Кефир", "Ряженка", "Йогурт", "Йогурт греческий", "Мацони", "Творог", "Сыр твердый", "Сыр плавленый", "Сыр моцарелла", "Сыр фета", "Сыр колбасный", "Сулугуни", "Брынза", "Сыр российский", "Сыр творожный", "Сыр сливочный", "Пармезан", "Масло сливочное", "Масло топленое", "Маргарин"]
            },
            {
                name: "🥚 Яйца",
                items: ["Яйца куриные", "Яйца перепелиные"]
            },
            {
                name: "🍞 Хлеб и выпечка",
                items: ["Хлеб белый", "Хлеб ржаной", "Батон", "Лаваш", "Багет", "Мука", "Дрожжи", "Разрыхлитель", "Ванилин", "Печенье затяжное", "Печенье сахарное", "Сухари панировочные", "Гренки", "Крекеры"]
            },
            {
                name: "🥫 Консервы и заготовки",
                items: ["Оливки", "Маслины", "Кукуруза консервированная", "Горошек консервированный", "Фасоль консервированная", "Каперсы", "Томатная паста", "Огурцы маринованные", "Корнишоны", "Помидоры маринованные", "Грибы соленые", "Грибы маринованные", "Тунец консервированный", "Шпроты", "Сайра", "Лечо", "Аджика"]
            },
            {
                name: "🧴 Масла и соусы",
                items: ["Масло подсолнечное", "Масло оливковое", "Масло кунжутное", "Соевый соус", "Томатный соус", "Майонез", "Кетчуп", "Горчица", "Горчица дижонская", "Хрен", "Уксус", "Бальзамический уксус", "Вустерширский соус"]
            },
            {
                name: "🥜 Орехи и семена",
                items: ["Грецкий орех", "Пекан", "Фундук", "Миндаль", "Бразильский орех", "Кешью", "Макадамия", "Фисташки", "Арахис", "Кунжут", "Семена Чиа", "Семена подсолнуха", "Семечки тыквенные"]
            },
            {
                name: "🍰 Сладости",
                items: ["Сахар", "Какао", "Шоколад", "Мед", "Варенье", "Джем", "Конфитюр", "Кокосовая стружка"]
            }
        ];

        let selectedIngredients = new Set();
        let selectedType = "all";
        let currentCuisine = "all";
        
        // Импорт рецептов из модульной системы
        import { allRecipes } from './modules/recipes/index.js';
        
        console.log(`✅ Загружено рецептов: ${allRecipes.length}`);

        // ============================================
        // ОТРИСОВКА ВСЕХ ГРУПП ПРОДУКТОВ (СВЕРНУТЫЕ)
        // ============================================
        
        function renderIngredients() {
            const container = document.getElementById('ingredientsGroupsContainer');
            if (!container) return;
            
            container.innerHTML = '';
            
            ingredientsGroups.forEach(group => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'ingredient-group';
                
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `<span class="group-title">${group.name}</span><span class="group-toggle">▶</span>`;
                
                const itemsDiv = document.createElement('div');
                itemsDiv.className = 'group-items';
                itemsDiv.style.display = 'none';
                
                group.items.forEach(item => {
                    const btn = document.createElement('button');
                    btn.textContent = item;
                    btn.className = 'ingredient-btn';
                    btn.addEventListener('click', () => {
                        btn.classList.toggle('selected');
                        if (btn.classList.contains('selected')) {
                            selectedIngredients.add(item);
                        } else {
                            selectedIngredients.delete(item);
                        }
                    });
                    itemsDiv.appendChild(btn);
                });
                
                let collapsed = true;
                header.addEventListener('click', () => {
                    collapsed = !collapsed;
                    itemsDiv.style.display = collapsed ? 'none' : 'flex';
                    header.querySelector('.group-toggle').textContent = collapsed ? '▶' : '▼';
                });
                
                groupDiv.appendChild(header);
                groupDiv.appendChild(itemsDiv);
                container.appendChild(groupDiv);
            });
        }

        // ============================================
        // РАСШИРЕННЫЙ ПОИСК РЕЦЕПТОВ
        // ============================================
        
        function findRecipes() {
            const resultsDiv = document.getElementById('recipesList');
            
            if (selectedIngredients.size === 0) {
                resultsDiv.innerHTML = '<div class="placeholder">⚠️ Выберите продукты в холодильнике</div>';
                return;
            }
            
            const userIngredients = Array.from(selectedIngredients);
            
            // Результаты разделим на 3 категории
            let perfectMatches = [];      // 100% попадание (все ингредиенты есть)
            let missing1Match = [];       // не хватает 1 ингредиента
            let missing2Match = [];       // не хватает 2 ингредиентов
            
            allRecipes.forEach(recipe => {
                // Фильтр по типу блюда
                if (selectedType !== "all" && recipe.type !== selectedType) return;
                
                // Фильтр по кухне
                if (currentCuisine !== "all" && recipe.cuisine !== currentCuisine) return;
                
                // Проверяем каждый ингредиент рецепта
                let missingIngredients = [];
                let matchedIngredients = [];
                
                recipe.ingredients.forEach(recipeIng => {
                    const found = userIngredients.some(userIng => 
                        userIng.toLowerCase().includes(recipeIng.toLowerCase()) ||
                        recipeIng.toLowerCase().includes(userIng.toLowerCase())
                    );
                    
                    if (found) {
                        matchedIngredients.push(recipeIng);
                    } else {
                        missingIngredients.push(recipeIng);
                    }
                });
                
                const missingCount = missingIngredients.length;
                const matchCount = matchedIngredients.length;
                const totalCount = recipe.ingredients.length;
                
                // Сортировка по категориям
                if (missingCount === 0) {
                    // 100% попадание
                    perfectMatches.push({ ...recipe, missingIngredients: [], matchPercent: 100 });
                } else if (missingCount === 1) {
                    // Не хватает 1 ингредиента
                    missing1Match.push({ ...recipe, missingIngredients, matchPercent: Math.round((matchCount / totalCount) * 100) });
                } else if (missingCount === 2) {
                    // Не хватает 2 ингредиентов
                    missing2Match.push({ ...recipe, missingIngredients, matchPercent: Math.round((matchCount / totalCount) * 100) });
                }
            });
            
            // Если нет никаких рецептов
            if (perfectMatches.length === 0 && missing1Match.length === 0 && missing2Match.length === 0) {
                resultsDiv.innerHTML = '<div class="placeholder">😕 Нет рецептов с выбранными продуктами. Попробуйте добавить ещё ингредиенты или выберите другую кухню.</div>';
                return;
            }
            
            // Собираем HTML для вывода
            let html = '';
            
            // === ПОЛНЫЕ СОВПАДЕНИЯ (100%) ===
            if (perfectMatches.length > 0) {
                html += `
                    <div class="results-section">
                        <div class="section-header perfect">
                            <span class="section-icon">✅</span>
                            <h3>Можно приготовить прямо сейчас! (${perfectMatches.length})</h3>
                            <span class="section-desc">Все ингредиенты в наличии</span>
                        </div>
                        <div class="recipes-grid">
                            ${perfectMatches.map(recipe => renderRecipeCard(recipe, 'perfect')).join('')}
                        </div>
                    </div>
                `;
            }
            
            // === НЕ ХВАТАЕТ 1 ИНГРЕДИЕНТА ===
            if (missing1Match.length > 0) {
                html += `
                    <div class="results-section">
                        <div class="section-header missing1">
                            <span class="section-icon">🛒</span>
                            <h3>Докупите 1 продукт! (${missing1Match.length})</h3>
                            <span class="section-desc">Добавьте недостающий ингредиент — и рецепт станет доступен</span>
                        </div>
                        <div class="recipes-grid">
                            ${missing1Match.map(recipe => renderRecipeCard(recipe, 'missing1')).join('')}
                        </div>
                    </div>
                `;
            }
            
            // === НЕ ХВАТАЕТ 2 ИНГРЕДИЕНТОВ ===
            if (missing2Match.length > 0) {
                html += `
                    <div class="results-section">
                        <div class="section-header missing2">
                            <span class="section-icon">📝</span>
                            <h3>Докупите 2 продукта (${missing2Match.length})</h3>
                            <span class="section-desc">Добавьте недостающие ингредиенты — и рецепт станет доступен</span>
                        </div>
                        <div class="recipes-grid">
                            ${missing2Match.map(recipe => renderRecipeCard(recipe, 'missing2')).join('')}
                        </div>
                    </div>
                `;
            }
            
            resultsDiv.innerHTML = html;
            
            // Добавляем обработчики кликов
            document.querySelectorAll('.recipe-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.getAttribute('data-id'));
                    let recipe = [...perfectMatches, ...missing1Match, ...missing2Match].find(r => r.id === id);
                    if (recipe) showRecipeModal(recipe);
                });
            });
        }
        
        // ============================================
        // ОТРИСОВКА КАРТОЧКИ РЕЦЕПТА
        // ============================================
        
        function renderRecipeCard(recipe, status) {
            let statusBadge = '';
            let missingInfo = '';
            
            if (status === 'perfect') {
                statusBadge = '<span class="recipe-badge perfect-badge">✅ 100% готово</span>';
            } else if (status === 'missing1') {
                const missingItem = recipe.missingIngredients[0];
                statusBadge = '<span class="recipe-badge missing1-badge">🛒 Не хватает 1 продукта</span>';
                missingInfo = `<div class="missing-warning">⚠️ Нужно докупить: <strong>${missingItem}</strong></div>`;
            } else if (status === 'missing2') {
                const missingItems = recipe.missingIngredients.join(', ');
                statusBadge = '<span class="recipe-badge missing2-badge">📝 Не хватает 2 продуктов</span>';
                missingInfo = `<div class="missing-warning">⚠️ Нужно докупить: <strong>${missingItems}</strong></div>`;
            }
            
            // Показываем больше ингредиентов в карточке для рекомендаций
            const ingredientsPreview = recipe.ingredients.slice(0, 3).join(', ');
            const hasMore = recipe.ingredients.length > 3;
            
            return `
                <div class="recipe-card" data-id="${recipe.id}">
                    ${statusBadge}
                    <div class="recipe-img-placeholder">🍽️</div>
                    <h4>${recipe.name}</h4>
                    <p>${getCuisineEmoji(recipe.cuisine)} ${getCuisineName(recipe.cuisine)} • ${recipe.type}</p>
                    <div class="recipe-meta">⏱️ ${recipe.cookingTime || 30} мин • 🔥 ${recipe.calories || '?'} ккал</div>
                    <small>📋 Ингредиенты: ${ingredientsPreview}${hasMore ? '...' : ''}</small>
                    ${missingInfo}
                </div>
            `;
        }
        
        function getCuisineEmoji(cuisine) {
            const map = { russian: '🍞', eastern: '🥘', european: '🍷' };
            return map[cuisine] || '🍽️';
        }
        
        function getCuisineName(cuisine) {
            const map = { russian: 'Русская', eastern: 'Восточная', european: 'Европейская' };
            return map[cuisine] || cuisine;
        }
        
        function showRecipeModal(recipe) {
            const modalBody = document.getElementById('modalRecipeBody');
            
            // Показываем в модалке список ингредиентов и недостающие, если есть
            let missingSection = '';
            if (recipe.missingIngredients && recipe.missingIngredients.length > 0) {
                missingSection = `
                    <div class="missing-warning" style="margin-bottom: 20px;">
                        ⚠️ <strong>Внимание!</strong> Для этого рецепта вам не хватает:<br>
                        📋 ${recipe.missingIngredients.join(', ')}
                    </div>
                `;
            }
            
            modalBody.innerHTML = `
                <h2>${recipe.name}</h2>
                <div class="recipe-img-placeholder" style="height: 150px; margin-bottom: 15px;">🍽️</div>
                ${missingSection}
                <p><strong>🍴 Кухня:</strong> ${getCuisineName(recipe.cuisine)} | <strong>⏱️ Время:</strong> ${recipe.cookingTime || 30} мин | <strong>🔥 Калории:</strong> ${recipe.calories || '?'} ккал</p>
                <h3>📋 Ингредиенты:</h3>
                <ul>${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
                <h3>👨‍🍳 Пошаговый рецепт:</h3>
                <div class="steps-list">${recipe.steps.map(s => `<p>${s}</p>`).join('')}</div>
                <h3>💡 Совет шефа:</h3>
                <p class="chef-tip">${recipe.tip || 'Подавай с любовью и свежей зеленью!'}</p>
            `;
            document.getElementById('recipeModal').style.display = 'flex';
        }

        // ============================================
        // НАСТРОЙКА ИНТЕРФЕЙСА
        // ============================================
        
        function setupEventListeners() {
            document.getElementById('menuToggle')?.addEventListener('click', () => {
                document.getElementById('mobileNav')?.classList.toggle('open');
            });
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.getAttribute('data-theme');
                    document.body.classList.remove('theme-green', 'theme-orange');
                    document.body.classList.add(`theme-${theme}`);
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            document.querySelectorAll('.type-buttons button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.type-buttons button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedType = btn.getAttribute('data-type');
                });
            });
            
            document.getElementById('findRecipesBtn')?.addEventListener('click', findRecipes);
            
            document.querySelectorAll('.nav-category').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCuisine = btn.getAttribute('data-category');
                    document.getElementById('mobileNav')?.classList.remove('open');
                    if (selectedIngredients.size > 0) findRecipes();
                });
            });
            
            // ИИ-ассистент
            const aiModal = document.getElementById('aiModal');
            const openAiBtn = document.getElementById('openAiAssistantBtn');
            const closeAi = document.querySelector('.close-ai');
            const askBtn = document.getElementById('askAiBtn');
            const aiQuestion = document.getElementById('aiQuestion');
            const aiAnswer = document.getElementById('aiAnswer');
            
            openAiBtn?.addEventListener('click', () => { if(aiModal) aiModal.style.display = 'flex'; });
            closeAi?.addEventListener('click', () => { if(aiModal) aiModal.style.display = 'none'; });
            
            askBtn?.addEventListener('click', () => {
                const q = aiQuestion?.value.trim();
                if (!q) {
                    if(aiAnswer) aiAnswer.innerHTML = '❓ Напишите ваш вопрос о готовке!';
                    return;
                }
                aiAnswer.innerHTML = '🧑‍🍳 ' + getAIAnswer(q);
            });
            
            const modal = document.getElementById('recipeModal');
            document.querySelector('.close')?.addEventListener('click', () => { if(modal) modal.style.display = 'none'; });
            window.onclick = (e) => { 
                if (e.target === modal) modal.style.display = 'none'; 
                if (e.target === aiModal) aiModal.style.display = 'none'; 
            };
        }
        
        function getAIAnswer(question) {
            const q = question.toLowerCase();
            if (q.includes('заменить яйца')) return 'Яйца можно заменить: банановым пюре (1 яйцо = 1/2 банана), льняной мукой с водой, или тофу.';
            if (q.includes('заменить сливки')) return 'Сливки заменяют: кокосовое молоко, смесь молока с маслом, или густая сметана с молоком.';
            if (q.includes('сочное мясо')) return 'Маринуй в кефире/йогурте 2 часа, не пережаривай, дай отдохнуть 5-10 минут после готовки.';
            if (q.includes('хрустящая корочка')) return 'Обсуши продукты перед жаркой, используй панировку, жарь на хорошо разогретой сковороде.';
            return `Отличный вопрос! Совет: всегда пробуй блюдо в процессе готовки.`;
        }
        
        // ============================================
        // ЗАПУСК
        // ============================================
        
        renderIngredients();
        setupEventListeners();
        document.body.classList.add('theme-green');
        
        console.log("✅ Приложение загружено!");
    </script>
</body>
</html>
