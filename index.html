        { name: "🥬 Овощи", items: ["Картофель", "Морковь", "Лук репчатый", "Лук красный", "Лук зеленый", "Чеснок", "Капуста белокочанная", "Капуста краснокочанная", "Брокколи", "Цветная капуста", "Брюссельская капуста", "Дайкон", "Помидоры", "Помидоры черри", "Огурцы", "Огурцы соленые", "Огурцы маринованные", "Болгарский перец", "Перец красный жгучий", "Кабачки", "Баклажаны", "Тыква", "Свекла", "Редис", "Шпинат", "Салат", "Салат Романо", "Салат Айсберг", "Салат Микс", "Руккола", "Сельдерей", "Спаржа", "Фасоль стручковая"] },
        { name: "🍎 Фрукты и ягоды", items: ["Яблоко", "Груша", "Банан", "Апельсин", "Лимон", "Лайм", "Мандарин", "Киви", "Виноград", "Клубника", "Малина", "Черника", "Вишня", "Персик", "Абрикос", "Авокадо", "Гранат", "Ананас", "Манго", "Чернослив", "Курага", "Изюм", "Сухофрукты"] },
        { name: "🍄 Грибы", items: ["Белые грибы", "Лисички", "Грузди", "Рыжики", "Маслята", "Лесные грибы", "Шампиньоны", "Вешенки", "Шиитаке"] },
        { name: "🌿 Зелень и специи", items: ["Укроп", "Петрушка", "Кинза", "Базилик", "Мята", "Розмарин", "Тимьян", "Орегано", "Зеленый лук", "Черемша", "Руккола", "Шпинат", "Салат", "Микрозелень", "Соль поваренная", "Соль морская", "Перец черный", "Перец красный жгучий", "Перец белый", "Смесь перцев", "Кориандр", "Паприка", "Куркума", "Имбирь"] },
        { name: "🍚 Крупы и бобовые", items: ["Гречка", "Рис круглозерный", "Рис длиннозёрный", "Овсянка", "Геркулес", "Пшено", "Перловка", "Булгур", "Кускус", "Киноа", "Маш", "Чечевица красная", "Чечевица зеленая", "Нут", "Фасоль", "Горох", "Бобы"] },
        { name: "🍝 Макаронные изделия", items: ["Спагетти", "Феттучини", "Лапша яичная", "Лапша рисовая", "Вермишель", "Рожки", "Перья", "Ракушки"] },
        { name: "🥛 Молочные продукты", items: ["Молоко", "Сгущённое молоко", "Сливки", "Сгущённые сливки", "Сметана", "Кефир", "Ряженка", "Йогурт", "Йогурт греческий", "Мацони", "Творог", "Сыр твердый", "Сыр плавленый", "Сыр моцарелла", "Сыр фета", "Сыр колбасный", "Сулугуни", "Брынза", "Сыр российский", "Сыр творожный", "Сыр сливочный", "Пармезан", "Дор блю", "Масло сливочное", "Масло топленое", "Маргарин"] },
        { name: "🥚 Яйца", items: ["Яйца куриные", "Яйца перепелиные"] },
        { name: "🍞 Хлеб и выпечка", items: ["Хлеб белый", "Хлеб ржаной", "Батон", "Лаваш", "Тарталетки", "Профитроли", "Багет", "Мука", "Дрожжи", "Разрыхлитель", "Ванилин", "Печенье затяжное", "Печенье сахарное", "Сухари панировочные", "Гренки", "Крекеры"] },
        { name: "🥫 Консервы и заготовки", items: ["Капуста квашеная", "Оливки", "Маслины", "Кукуруза консервированная", "Горошек консервированный", "Фасоль консервированная", "Каперсы", "Томатная паста", "Огурцы маринованные", "Корнишоны", "Помидоры маринованные", "Грибы соленые", "Грибы маринованные", "Тунец консервированный", "Шпроты", "Сайра", "Лечо", "Аджика", "Икра кабачковая", "Икра баклажанная"] },
        { name: "🧴 Масла и соусы", items: ["Масло подсолнечное", "Масло растительное", "Масло оливковое", "Масло кунжутное", "Соевый соус", "Томатный соус", "Майонез", "Кетчуп", "Горчица", "Горчица дижонская", "Хрен", "Уксус", "Бальзамический уксус", "Вустерширский соус"] },
        { name: "🥜 Орехи и семена", items: ["Грецкий орех", "Пекан", "Фундук", "Миндаль", "Бразильский орех", "Кешью", "Макадамия", "Фисташки", "Арахис", "Кунжут", "Семена Чиа", "Семена подсолнуха", "Семечки тыквенные"] },
        { name: "🍰 Сладости", items: ["Сахар", "Какао", "Шоколад", "Мед", "Варенье", "Джем", "Конфитюр", "Кокосовая стружка"] }
    ];

    let selectedIngredients = new Set();
    let selectedType = "all";
    let currentCuisine = "all";
    let allButtonsList = [];

    function normalizeIngredient(name) { return name.toLowerCase().trim().replace(/[\(\)]/g, '').replace(/\s*\([^)]*\)/g, '').split(',')[0].trim(); }
    function isMatch(user, recipe) { const u = normalizeIngredient(user); const r = normalizeIngredient(recipe); return u === r || u.includes(r) || r.includes(u); }

    function selectAll() { allButtonsList.forEach(b => { if(!b.classList.contains('selected')){ b.classList.add('selected'); selectedIngredients.add(b.textContent); } }); }
    function deselectAll() { allButtonsList.forEach(b => { if(b.classList.contains('selected')){ b.classList.remove('selected'); selectedIngredients.delete(b.textContent); } }); }

    function renderIngredients() {
        const container = document.getElementById('ingredientsGroupsContainer');
        if(!container) return;
        container.innerHTML = '';
        allButtonsList = [];
        ingredientsGroups.forEach(group => {
            const groupDiv = document.createElement('div'); groupDiv.className = 'ingredient-group';
            const header = document.createElement('div'); header.className = 'group-header';
            const titleSpan = document.createElement('span'); titleSpan.className = 'group-title'; titleSpan.textContent = group.name;
            const actionsDiv = document.createElement('div'); actionsDiv.className = 'group-actions';
            const selectBtn = document.createElement('button'); selectBtn.textContent = 'Выбрать всё'; selectBtn.className = 'group-select-all';
            const deselectBtn = document.createElement('button'); deselectBtn.textContent = 'Убрать всё'; deselectBtn.className = 'group-deselect-all';
            actionsDiv.appendChild(selectBtn); actionsDiv.appendChild(deselectBtn);
            header.appendChild(titleSpan); header.appendChild(actionsDiv);
            const itemsDiv = document.createElement('div'); itemsDiv.className = 'group-items'; itemsDiv.style.display = 'none';
            group.items.forEach(item => {
                const btn = document.createElement('button'); btn.textContent = item; btn.className = 'ingredient-btn';
                btn.onclick = () => { btn.classList.toggle('selected'); if(btn.classList.contains('selected')) selectedIngredients.add(item); else selectedIngredients.delete(item); };
                itemsDiv.appendChild(btn); allButtonsList.push(btn);
            });
            let collapsed = true;
            header.onclick = (e) => { if(e.target === selectBtn || e.target === deselectBtn || selectBtn.contains(e.target) || deselectBtn.contains(e.target)) return; collapsed = !collapsed; itemsDiv.style.display = collapsed ? 'none' : 'flex'; };
            selectBtn.onclick = (e) => { e.stopPropagation(); group.items.forEach(i => { const b = Array.from(itemsDiv.children).find(x=>x.textContent===i); if(b && !b.classList.contains('selected')){ b.classList.add('selected'); selectedIngredients.add(i); } }); };
            deselectBtn.onclick = (e) => { e.stopPropagation(); group.items.forEach(i => { const b = Array.from(itemsDiv.children).find(x=>x.textContent===i); if(b && b.classList.contains('selected')){ b.classList.remove('selected'); selectedIngredients.delete(i); } }); };
            groupDiv.appendChild(header); groupDiv.appendChild(itemsDiv); container.appendChild(groupDiv);
        });
    }

    function getCuisineEmoji(c) { return { russian:'🍞', eastern:'🥘', european:'🍷' }[c] || '🍽️'; }
    function getCuisineName(c) { return { russian:'Русская', eastern:'Восточная', european:'Европейская' }[c] || c; }

    function findRecipes() {
        const resultsDiv = document.getElementById('recipesList');
        if(selectedIngredients.size === 0) { resultsDiv.innerHTML = '<div class="placeholder">⚠️ Выберите продукты в холодильнике</div>'; return; }
        const user = Array.from(selectedIngredients);
        let perfect = [], missing1 = [], missing2 = [];
        allRecipes.forEach(recipe => {
            if(selectedType !== "all" && recipe.type !== selectedType) return;
            if(currentCuisine !== "all" && recipe.cuisine !== currentCuisine) return;
            let missing = [];
            recipe.ingredients.forEach(ing => { if(!user.some(u => isMatch(u, ing))) missing.push(ing); });
            if(missing.length === 0) perfect.push({ ...recipe, missing });
            else if(missing.length === 1) missing1.push({ ...recipe, missing });
            else if(missing.length === 2) missing2.push({ ...recipe, missing });
        });
        if(perfect.length === 0 && missing1.length === 0 && missing2.length === 0) { resultsDiv.innerHTML = '<div class="placeholder">😕 Нет рецептов с выбранными продуктами</div>'; return; }
        let html = '';
        if(perfect.length) html += `<div class="results-section"><div class="section-header perfect"><span class="section-icon">✅</span><h3>Можно приготовить прямо сейчас! (${perfect.length})</h3></div><div class="recipes-grid">${perfect.map(r => renderCard(r, 'perfect')).join('')}</div></div>`;
        if(missing1.length) html += `<div class="results-section"><div class="section-header missing1"><span class="section-icon">🛒</span><h3>Докупите 1 продукт! (${missing1.length})</h3></div><div class="recipes-grid">${missing1.map(r => renderCard(r, 'missing1')).join('')}</div></div>`;
        if(missing2.length) html += `<div class="results-section"><div class="section-header missing2"><span class="section-icon">📝</span><h3>Докупите 2 продукта (${missing2.length})</h3></div><div class="recipes-grid">${missing2.map(r => renderCard(r, 'missing2')).join('')}</div></div>`;
        resultsDiv.innerHTML = html;
        document.querySelectorAll('.recipe-card').forEach(c => c.addEventListener('click', () => { const id = parseInt(c.dataset.id); let recipe = [...perfect, ...missing1, ...missing2].find(r => r.id === id); if(recipe) showModal(recipe); }));
    }

    function renderCard(recipe, status) {
        let badge = '', missingInfo = '';
        if(status === 'perfect') badge = '<span class="recipe-badge perfect-badge">✅ 100% готово</span>';
        else if(status === 'missing1') { badge = '<span class="recipe-badge missing1-badge">🛒 Не хватает 1 продукта</span>'; missingInfo = `<div class="missing-warning">⚠️ Нужно докупить: <strong>${recipe.missing[0]}</strong></div>`; }
        else if(status === 'missing2') { badge = '<span class="recipe-badge missing2-badge">📝 Не хватает 2 продуктов</span>'; missingInfo = `<div class="missing-warning">⚠️ Нужно докупить: <strong>${recipe.missing.join(', ')}</strong></div>`; }
        return `<div class="recipe-card" data-id="${recipe.id}">${badge}<div class="recipe-img-placeholder">🍽️</div><h4>${recipe.name}</h4><p>${getCuisineEmoji(recipe.cuisine)} ${getCuisineName(recipe.cuisine)} • ${recipe.type === 'salad' ? 'Салат' : recipe.type === 'soup' ? 'Суп' : recipe.type}</p><div class="recipe-meta">⏱️ ${recipe.cookingTime || 30} мин • 🔥 ${recipe.calories || '?'} ккал</div><small>📋 ${recipe.ingredients.slice(0,3).join(', ')}${recipe.ingredients.length > 3 ? '...' : ''}</small>${missingInfo}</div>`;
    }

    function showModal(recipe) {
        const body = document.getElementById('modalRecipeBody');
        body.innerHTML = `<h2>${recipe.name}</h2><div class="recipe-img-placeholder" style="height:150px;">🍽️</div><p><strong>🍴 Кухня:</strong> ${getCuisineName(recipe.cuisine)} | <strong>⏱️ Время:</strong> ${recipe.cookingTime || 30} мин | <strong>🔥 Калории:</strong> ${recipe.calories || '?'} ккал</p><h3>📋 Ингредиенты:</h3><ul>${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}</ul><h3>👨‍🍳 Пошаговый рецепт:</h3><div class="steps-list">${recipe.steps.map(s => `<p>${s}</p>`).join('')}</div><p class="chef-tip">💡 ${recipe.tip || 'Подавай с любовью!'}</p>`;
        document.getElementById('recipeModal').style.display = 'flex';
    }

    function setup() {
        document.getElementById('selectAllIngredientsBtn')?.addEventListener('click', selectAll);
        document.getElementById('deselectAllIngredientsBtn')?.addEventListener('click', deselectAll);
        document.getElementById('menuToggle')?.addEventListener('click', () => document.getElementById('mobileNav')?.classList.toggle('open'));
        document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => { const t = btn.dataset.theme; document.body.classList.remove('theme-green', 'theme-orange'); document.body.classList.add(`theme-${t}`); document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }));
        document.querySelectorAll('.type-buttons button').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.type-buttons button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedType = btn.dataset.type; }));
        document.getElementById('findRecipesBtn')?.addEventListener('click', findRecipes);
        document.querySelectorAll('.nav-category').forEach(btn => btn.addEventListener('click', () => { currentCuisine = btn.dataset.category; document.getElementById('mobileNav')?.classList.remove('open'); if(selectedIngredients.size) findRecipes(); }));
        const aiModal = document.getElementById('aiModal');
        document.getElementById('openAiAssistantBtn')?.addEventListener('click', () => aiModal.style.display = 'flex');
        document.querySelector('.close-ai')?.addEventListener('click', () => aiModal.style.display = 'none');
        document.getElementById('askAiBtn')?.addEventListener('click', () => { const q = document.getElementById('aiQuestion')?.value; const ans = document.getElementById('aiAnswer'); if(ans) ans.innerHTML = q ? `👨‍🍳 Отличный вопрос! Рекомендую: всегда пробуйте блюдо в процессе готовки.` : '❓ Напишите ваш вопрос!'; });
        document.querySelector('.close')?.addEventListener('click', () => document.getElementById('recipeModal').style.display = 'none');
        window.onclick = (e) => { if(e.target === document.getElementById('recipeModal')) document.getElementById('recipeModal').style.display = 'none'; if(e.target === aiModal) aiModal.style.display = 'none'; };
    }
    renderIngredients(); setup(); document.body.classList.add('theme-green');
</script>
